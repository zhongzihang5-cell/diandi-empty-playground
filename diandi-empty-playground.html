<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;letter-spacing:0}

:root{
  /* ===== Meiyou tokens ===== */
  --my-brand-red:#ff4d88;
  --my-brand-soft:rgba(255,77,136,0.08);
  --my-brand-soft-2:rgba(255,77,136,0.14);
  --my-bg:#f2f2f5;
  --my-bg-2:#fafafb;
  --my-surface:#ffffff;
  --my-text-primary:#323232;
  --my-text-secondary:#666666;
  --my-text-tertiary:#999999;
  --my-text-quat:#c8c8cc;
  --my-line:rgba(0,0,0,0.08);
  --my-success:#00cc99;
  --my-success-soft:rgba(0,204,153,0.10);
  --my-warning:#ff9500;
  --my-warning-soft:rgba(255,149,0,0.10);
  --my-danger:#ff4d4d;
  --my-link:#4f7cae;
  --my-link-soft:rgba(79,124,174,0.10);
  --my-purple:#8d54ff;
  --my-purple-soft:rgba(141,84,255,0.10);

  /* phase colors */
  --phase-period:#ff4d88;
  --phase-period-soft:rgba(255,77,136,0.10);
  --phase-foll:#4f7cae;
  --phase-foll-soft:rgba(79,124,174,0.10);
  --phase-ov:#8d54ff;
  --phase-ov-soft:rgba(141,84,255,0.10);
  --phase-lut:#ff9500;
  --phase-lut-soft:rgba(255,149,0,0.10);

  --r-xs:4px;
  --r-sm:8px;
  --r-md:12px;
  --r-pill:999px;

  --shadow-1:0 2px 10px rgba(50,50,50,0.06);
  --shadow-2:0 8px 24px rgba(0,0,0,0.14);

  /* 底部 Tab + 安全区（iPhone 横条） */
  --my-safe-bottom:env(safe-area-inset-bottom, 0px);
  --my-tabbar-h:calc(58px + var(--my-safe-bottom));
  --my-dock-float-b:calc(180px + var(--my-safe-bottom));

  font-family:'PingFang SC','SF Pro Text','Helvetica Neue',Arial,sans-serif;
}

html,body{
  background:#0e0e10;
  color:var(--my-text-primary);
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"palt";
}

#root{
  min-height:100vh;
  display:flex;justify-content:center;align-items:flex-start;
}

.phone{
  width:390px;
  min-height:100vh;
  background:var(--my-bg);
  position:relative;
  overflow:hidden;
}
@media(min-width:431px){.phone{box-shadow:0 0 40px rgba(0,0,0,0.25)}}

/* ============ STATUS BAR ============ */
.statusbar{
  height:44px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;
  background:var(--my-bg);
  font-size:14px;font-weight:600;color:var(--my-text-primary);
}
.sb-right{display:flex;align-items:center;gap:6px}
.statusbar svg{display:block}
.phone.is-home-detail-open .statusbar{
  background:#ff4d88;
  color:#fff;
}

.app{padding-bottom:160px}

/* ============ TOP NAV ============ */
.nav{
  height:44px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:var(--my-bg);
}
.nav-title{font-size:17px;font-weight:500;color:var(--my-text-primary)}
.nav-actions{display:flex;gap:14px}
.nav-icon{
  width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  color:var(--my-text-primary);cursor:pointer;
}

/* ============ COMPACT HEALTH STATUS BAR ============ */
.health{
  margin:4px 16px 12px;
  background:var(--my-surface);
  border-radius:var(--r-md);
  padding:12px 14px;
  box-shadow:var(--shadow-1);
  display:flex;align-items:center;gap:12px;
  cursor:pointer;
}
.health-light{
  width:8px;height:8px;border-radius:50%;
  background:var(--my-success);
  box-shadow:0 0 8px var(--my-success);
  flex-shrink:0;
}
.health-light.warn{background:var(--my-warning);box-shadow:0 0 8px var(--my-warning)}
.health-light.alert{background:var(--my-danger);box-shadow:0 0 8px var(--my-danger)}
.health-text{flex:1;min-width:0}
.health-title{
  font-size:14px;font-weight:500;color:var(--my-text-primary);
  display:flex;align-items:center;gap:6px;
}
.health-phase{
  font-size:11px;color:var(--my-brand-red);
  background:var(--my-brand-soft);
  padding:2px 8px;border-radius:var(--r-pill);
  font-weight:500;
}
.health-phase.foll{color:var(--phase-foll);background:var(--phase-foll-soft)}
.health-phase.ov{color:var(--phase-ov);background:var(--phase-ov-soft)}
.health-phase.lut{color:var(--phase-lut);background:var(--phase-lut-soft)}
.health-desc{
  font-size:12px;color:var(--my-text-secondary);margin-top:3px;line-height:1.4;
}
.health-day{
  flex-shrink:0;
  text-align:center;
  padding-left:10px;border-left:0.5px solid var(--my-line);
}
.health-day-num{
  font-size:18px;font-weight:600;color:var(--my-text-primary);
  line-height:1;font-variant-numeric:tabular-nums;
}
.health-day-lbl{
  font-size:10px;color:var(--my-text-tertiary);margin-top:3px;
}

/* ============ TIMELINE ============ */
.timeline{
  position:relative;
  padding-left:44px;
  padding-right:16px;
}
.timeline::before{
  content:'';
  position:absolute;
  left:20px;top:6px;bottom:0;
  width:1.5px;
  background:linear-gradient(180deg,
    var(--my-text-quat) 0%,
    var(--my-text-quat) 40%,
    var(--my-line) 100%);
}

/* day section header */
.tl-section{margin-bottom:20px;position:relative}
.tl-day-row{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:0 0 10px 0;
  position:relative;
}
.tl-day-row::before{
  content:'';
  position:absolute;
  left:-30px;top:8px;
  width:10px;height:10px;
  border-radius:50%;
  background:var(--my-surface);
  border:2px solid var(--my-brand-red);
  box-shadow:0 0 0 3px var(--my-bg);
}
.tl-section.today .tl-day-row::before{
  background:var(--my-brand-red);
  box-shadow:0 0 0 3px var(--my-bg), 0 0 0 6px rgba(255,77,136,0.15);
}
.tl-section.dim .tl-day-row::before{
  border-color:var(--my-text-quat);
  width:8px;height:8px;
  left:-29px;
}
.tl-day-num{
  font-size:22px;font-weight:600;
  color:var(--my-text-primary);
  line-height:1.1;
  font-variant-numeric:tabular-nums;
  letter-spacing:-0.5px;
}
.tl-day-num::after{
  content:'';display:block;
  width:24px;height:2px;
  background:var(--my-brand-red);
  border-radius:1px;margin-top:4px;
}
.tl-section.dim .tl-day-num{color:var(--my-text-secondary);font-weight:500;font-size:18px}
.tl-section.dim .tl-day-num::after{display:none}
.tl-day-meta{
  font-size:12px;color:var(--my-text-tertiary);
  font-variant-numeric:tabular-nums;
}
.tl-day-meta b{font-weight:500;color:var(--my-text-secondary)}

/* phase marker on timeline */
.tl-phase{
  position:relative;
  margin:6px 0 14px;
  padding:0;
  display:flex;align-items:center;
}
.tl-phase::before{
  content:'';
  position:absolute;
  left:-30px;top:50%;transform:translateY(-50%);
  width:8px;height:8px;
  border-radius:50%;
  background:var(--phase-period);
  border:2px solid var(--my-bg);
  box-shadow:0 0 0 2px var(--my-bg);
}
.tl-phase.foll::before{background:var(--phase-foll)}
.tl-phase.ov::before{background:var(--phase-ov)}
.tl-phase.lut::before{background:var(--phase-lut)}
.tl-phase-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;
  border-radius:var(--r-pill);
  background:var(--phase-period-soft);
  color:var(--phase-period);
  font-size:11px;font-weight:500;
}
.tl-phase.foll .tl-phase-pill{background:var(--phase-foll-soft);color:var(--phase-foll)}
.tl-phase.ov .tl-phase-pill{background:var(--phase-ov-soft);color:var(--phase-ov)}
.tl-phase.lut .tl-phase-pill{background:var(--phase-lut-soft);color:var(--phase-lut)}
.tl-phase-pill::before{
  content:'';width:5px;height:5px;border-radius:50%;background:currentColor;
}

/* gap marker (X days) */
.tl-gap{
  position:relative;
  height:32px;
  display:flex;align-items:center;
  margin:2px 0;
}
.tl-gap::before{
  content:'';position:absolute;
  left:-26px;top:50%;transform:translateY(-50%);
  width:4px;height:4px;border-radius:50%;
  background:var(--my-text-quat);
}
.tl-gap-lbl{
  font-size:10px;
  color:var(--my-text-tertiary);
  padding:1px 8px;
  border-radius:var(--r-pill);
  background:var(--my-bg-2);
  border:0.5px solid var(--my-line);
}

/* cycle boundary / month report */
.tl-cycle-report{
  position:relative;
  margin:18px 0;
}
.tl-cycle-report::before{
  content:'';
  position:absolute;
  left:-30px;top:18px;
  width:14px;height:14px;
  border-radius:3px;
  background:var(--my-success);
  transform:rotate(45deg);
  box-shadow:0 0 0 3px var(--my-bg);
}
.tl-cycle-report.warn::before{background:var(--my-warning)}
.tl-cycle-report.alert::before{background:var(--my-danger)}
.cycle-card{
  background:linear-gradient(135deg, rgba(0,204,153,0.06) 0%, rgba(0,204,153,0.02) 100%);
  border:0.5px solid rgba(0,204,153,0.20);
  border-radius:var(--r-md);
  padding:14px 16px;
  cursor:pointer;
}
.tl-cycle-report.warn .cycle-card{
  background:linear-gradient(135deg, rgba(255,149,0,0.07) 0%, rgba(255,149,0,0.02) 100%);
  border-color:rgba(255,149,0,0.22);
}
.tl-cycle-report.alert .cycle-card{
  background:linear-gradient(135deg, rgba(255,77,77,0.07) 0%, rgba(255,77,77,0.02) 100%);
  border-color:rgba(255,77,77,0.22);
}
.cycle-card-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.cycle-card-lbl{
  font-size:11px;
  color:var(--my-success);
  font-weight:600;
  letter-spacing:1px;
}
.tl-cycle-report.warn .cycle-card-lbl{color:var(--my-warning)}
.tl-cycle-report.alert .cycle-card-lbl{color:var(--my-danger)}
.cycle-card-arrow{color:var(--my-text-tertiary);font-size:14px}
.cycle-card-title{
  font-size:15px;
  font-weight:600;
  color:var(--my-text-primary);
  margin-bottom:4px;
}
.cycle-card-range{
  font-size:11px;
  color:var(--my-text-tertiary);
  margin-bottom:12px;
  font-variant-numeric:tabular-nums;
}
.cycle-card-stats{
  display:flex;gap:0;
  background:rgba(255,255,255,0.6);
  border-radius:var(--r-sm);
  padding:10px 4px;
  margin-bottom:10px;
}
.cycle-card-stat{
  flex:1;
  text-align:center;
  position:relative;
}
.cycle-card-stat+.cycle-card-stat::before{
  content:'';position:absolute;left:0;top:20%;height:60%;width:0.5px;
  background:var(--my-line);
}
.cc-num{
  font-size:18px;
  font-weight:600;
  color:var(--my-text-primary);
  line-height:1;
  font-variant-numeric:tabular-nums;
}
.cc-num.brand{color:var(--my-brand-red)}
.cc-num.warn{color:var(--my-warning)}
.cc-num.good{color:var(--my-success)}
.cc-lbl{
  font-size:10px;color:var(--my-text-tertiary);
  margin-top:4px;
}
.cycle-card-summary{
  font-size:12.5px;
  color:var(--my-text-secondary);
  line-height:1.55;
}

/* ============ GUIDE CARD (today) ============ */
.guide{
  background:var(--my-surface);
  border-radius:var(--r-md);
  padding:14px 16px;
  box-shadow:var(--shadow-1);
  display:flex;gap:10px;
  margin-bottom:12px;
}
.guide-avatar{width:32px;height:32px;flex-shrink:0;position:relative}
.guide-content{flex:1;min-width:0}
.guide-name{
  display:flex;align-items:center;gap:6px;
  font-size:12px;color:var(--my-text-secondary);
  margin-bottom:3px;
}
.guide-name b{font-weight:500;color:var(--my-text-primary)}
.guide-name .ai-badge{
  background:var(--my-brand-soft);color:var(--my-brand-red);
  font-size:10px;padding:1px 5px;border-radius:var(--r-xs);font-weight:500;
}
.guide-text{
  font-size:14px;color:var(--my-text-primary);line-height:1.55;margin-bottom:10px;
}
.guide-text em{font-style:normal;color:var(--my-brand-red);font-weight:500}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  padding:5px 11px;
  background:var(--my-bg);border:none;border-radius:var(--r-pill);
  font-size:12px;color:var(--my-text-primary);
  cursor:pointer;font-family:inherit;white-space:nowrap;
  transition:background 0.15s;
}
.chip:active{background:var(--my-brand-soft);color:var(--my-brand-red)}

/* ============ ENTRY ============ */
.entry{
  background:var(--my-surface);
  border-radius:var(--r-md);
  padding:14px 16px;
  margin-bottom:8px;
  box-shadow:var(--shadow-1);
}
.entry-meta{
  display:flex;align-items:center;justify-content:space-between;
  font-size:11px;color:var(--my-text-tertiary);
  margin-bottom:8px;font-variant-numeric:tabular-nums;
}
.entry-meta .more-btn{color:var(--my-text-tertiary);cursor:pointer;padding:2px 4px}
.entry-title{
  font-size:15px;font-weight:500;color:var(--my-text-primary);
  margin-bottom:6px;display:flex;align-items:center;gap:6px;
}
.entry-title-emoji{font-size:14px}
.entry-body{
  font-size:14px;line-height:1.65;color:var(--my-text-primary);
  margin-bottom:10px;word-break:break-word;
}

/* photo */
.entry-photo{
  width:100%;aspect-ratio:4/3;
  border-radius:var(--r-sm);margin-bottom:10px;overflow:hidden;
  background:
    repeating-linear-gradient(135deg,
      rgba(255,77,136,0.04) 0 14px,
      rgba(255,77,136,0.10) 14px 28px),
    var(--my-brand-soft);
  display:flex;align-items:center;justify-content:center;
  color:var(--my-brand-red);font-size:11px;
}

/* voice */
.voice{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;background:var(--my-brand-soft);
  border-radius:var(--r-sm);margin-bottom:10px;cursor:pointer;
}
.voice .voice-ico{color:var(--my-brand-red);flex-shrink:0;display:flex}
.voice-wave{flex:1;display:flex;align-items:center;gap:2px;height:20px}
.voice-wave span{width:2px;background:var(--my-brand-red);border-radius:1px;opacity:0.55}
.voice-dur{font-size:11px;color:var(--my-brand-red);font-variant-numeric:tabular-nums}

/* tags */
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tag{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11px;padding:3px 8px;border-radius:var(--r-pill);
  background:var(--my-bg);color:var(--my-text-secondary);line-height:1.4;
}
.tag.auto{background:var(--my-brand-soft);color:var(--my-brand-red)}
.tag.auto::before{
  content:'';width:5px;height:5px;border-radius:50%;
  background:var(--my-brand-red);margin-right:2px;
}

/* AI insight — tucked under like a folded note */
.ai-insight{
  background:var(--my-surface);
  border:0.5px solid rgba(79,124,174,0.20);
  border-left:3px solid var(--my-link);
  border-radius:var(--r-sm);
  padding:10px 12px;
  margin:-2px 8px 0;
  position:relative;
}
.ai-insight.good{
  border-color:rgba(0,204,153,0.22);border-left-color:var(--my-success);
}
.ai-insight.warn{
  border-color:rgba(255,149,0,0.22);border-left-color:var(--my-warning);
}
.ai-insight.brand{
  border-color:rgba(255,77,136,0.22);border-left-color:var(--my-brand-red);
}
.ai-ins-head{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--my-link);
  margin-bottom:6px;font-weight:500;
}
.ai-insight.good .ai-ins-head{color:var(--my-success)}
.ai-insight.warn .ai-ins-head{color:var(--my-warning)}
.ai-insight.brand .ai-ins-head{color:var(--my-brand-red)}
.ai-ins-head .mini-mascot{
  width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ffd0e2, #ffa3c4 60%, var(--my-brand-red));
  flex-shrink:0;
}
.ai-ins-points{
  display:flex;flex-direction:column;gap:4px;
  font-size:12px;color:var(--my-text-primary);line-height:1.55;
}
.ai-ins-points li{list-style:none;display:flex;gap:6px}
.ai-ins-points li .ico{flex-shrink:0;width:14px;text-align:center}

/* ============ INPUT BAR ============ */
.input-wrap{
  position:fixed;bottom:60px;
  left:50%;transform:translateX(-50%);
  width:100%;max-width:390px;
  padding:8px 12px 10px;
  background:linear-gradient(180deg, rgba(242,242,245,0) 0%, var(--my-bg) 35%);
  z-index:90;
  display:flex;flex-direction:column;
}
.input-bar{
  background:var(--my-surface);border-radius:var(--r-pill);
  padding:6px;
  box-shadow:var(--shadow-1);
  display:flex;align-items:center;gap:4px;
  border:0.5px solid var(--my-line);
  transition:box-shadow 0.18s, border-color 0.18s;
  position:relative;
}
.input-bar.focused{
  border-color:rgba(255,77,136,0.35);
  box-shadow:0 4px 16px rgba(255,77,136,0.16);
}
.ib-icon{
  width:36px;height:36px;border-radius:50%;
  background:transparent;border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--my-text-secondary);flex-shrink:0;
}
.ib-icon:active{background:var(--my-bg)}
.ib-input{
  flex:1;min-height:36px;display:flex;align-items:center;
  font-size:14px;color:var(--my-text-primary);padding:0 2px;
}
.ib-input textarea{
  width:100%;border:none;outline:none;background:transparent;
  font:inherit;color:inherit;resize:none;
  padding:9px 0;line-height:1.4;font-family:inherit;
}
.ib-input textarea::placeholder{color:var(--my-text-tertiary)}
.ib-send{
  width:36px;height:36px;border-radius:50%;
  background:var(--my-text-quat);border:none;color:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all 0.2s;
}
.ib-send.on{background:var(--my-brand-red)}
.ib-send svg{width:16px;height:16px}

.extract-preview{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 10px 6px 8px;
  background:var(--my-surface);border-radius:var(--r-pill);
  border:0.5px solid var(--my-line);
  box-shadow:0 4px 12px rgba(255,77,136,0.18);
  font-size:11px;color:var(--my-text-secondary);
  margin:0 0 8px 14px;align-self:flex-start;white-space:nowrap;
}
.extract-preview .ico{
  width:14px;height:14px;border-radius:50%;
  background:var(--my-brand-red);
  display:inline-flex;align-items:center;justify-content:center;
}
.extract-preview .ico::before{
  content:'';width:5px;height:5px;border-radius:50%;background:#fff;
  animation:dotPulse 1.2s ease-in-out infinite;
}
@keyframes dotPulse{
  0%,100%{transform:scale(0.6);opacity:0.7}
  50%{transform:scale(1);opacity:1}
}
.extract-preview .tag-pill{

}

@keyframes toastOut{to{opacity:0;transform:translateY(-8px)}}

        trigger: 'none',
        initialDone: true,
      },
    },
  });

  ['1', '2', '3', '4', '5', '6'].forEach((schemeId) => {
    const scene = buildEmptyScene(schemeId);
    window.DEMO_SCENES[scene.id] = scene;
  });
  window.DEMO_SCENE_OPTIONS.splice(0, window.DEMO_SCENE_OPTIONS.length);

  const OriginalRecordBlankStream = window.RecordBlankStream;
  const VOICE_TEXT = '今天体重 52kg，心情不错。';
  const WEIGHT_DATA = [
    { d:'周一', v:52.8 },
    { d:'周二', v:52.5 },
    { d:'周三', v:52.6 },
    { d:'周四', v:52.4 },
    { d:'周五', v:52.3 },
    { d:'周六', v:52.1 },
    { d:'今天', v:52.0, isToday:true },
  ];
  const cloneEmptyPlaygroundData = (value) => JSON.parse(JSON.stringify(value));
  window.getBlankScheme2PreviewTimeline = window.getBlankScheme2PreviewTimeline || (() => {
    const blocks = window.TIMELINE_BLOCKS || [];
    const clone = (obj) => JSON.parse(JSON.stringify(obj));
    const pickGroup = (day, groupId) => day?.items?.find((item) => item.id === groupId);
    const day514 = blocks.find((block) => block.type === 'day' && block.id === 'd-5-14');
    const day515 = blocks.find((block) => block.type === 'day' && block.id === 'd-5-15');
    const voiceDietGroup = pickGroup(day515, 'y1-g');
    const weightGroup = pickGroup(day514, 't5-g-514');
    const items = [];

    if(voiceDietGroup) items.push(clone(voiceDietGroup));
    if(weightGroup) items.push({ ...clone(weightGroup), aiDefaultOpen:true });
    if(!items.length) return [];

    const day = clone(day515 || day514);
    day.id = 's2-preview-day';
    day.date = '5/15';
    day.weekday = '周五';
    day.isToday = false;
    day.phaseTag = undefined;
    day.phaseKind = undefined;
    day.cycleDay = undefined;
    day.periodLen = undefined;
    day.summaryStats = undefined;
    day.items = items;
    return [day];
  });

  function EmptyPlaygroundHeader(){

            type="button"
            tabIndex={-1}

            <I name="search" size={20} stroke={1.7}/>

        </div>
      </div>
    );
  }

  function EmptyScheme3Body(){
    const TimelineStream = window.TimelineStream;
    const [showTimeline, setShowTimeline] = React.useState(false);
    const [typedCount, setTypedCount] = React.useState(0);
    const [extractDone, setExtractDone] = React.useState(false);

    React.useEffect(() => {
      const show = setTimeout(() => setShowTimeline(true), 760);
      const type = setTimeout(() => {
        let i = 0;
        const timer = setInterval(() => {
          i += 1;
          setTypedCount(Math.min(i, VOICE_TEXT.length));
          if(i >= VOICE_TEXT.length) clearInterval(timer);
        }, 58);
      }, 1080);
      const extract = setTimeout(() => setExtractDone(true), 2860);
      return () => {
        clearTimeout(show);
        clearTimeout(type);
        clearTimeout(extract);
      };
    }, []);

    const typed = VOICE_TEXT.slice(0, typedCount);
    const isTyping = showTimeline && typedCount < VOICE_TEXT.length;
    const typedWithCursor = isTyping ? (
      <>
        {typed}
        <span className="ep-s3-inline-cursor" aria-hidden="true"/>
      </>
    ) : typed;
    const extractionVisible = typedCount >= VOICE_TEXT.length && !extractDone;
    const tags = extractDone ? [
      { cat:'体重', val:'52kg', icon:'weight' },
      { cat:'心情', val:'不错', icon:'mood' },
    ] : [];
    const ai = extractDone ? {
      id:'ep-s3-ai',
      time:'07:46',
      kind:'chart',
      title:'近7日体重趋势',
      chartType:'weightTrend',
      chartData:WEIGHT_DATA,
      weightUnit:'kg',
      note:'近 7 天体重在 52kg 附近小幅波动，整体比较平稳。今天同时记录到心情不错，可以继续观察情绪和体重变化是否一起变好。',
    } : null;
    const recordGroup = {
      kind:'record-group',
      id:'ep-s3-record-group',
      isNew:true,
      staggerReveal:extractDone,
      aiDefaultOpen:true,
      primary:{
        id:'ep-s3-voice',
        time:'07:45',
        kind:'voice',
        duration:'0:08',
        text:typedWithCursor,
        tags,
      },
      ai,
    };
    const blocks = [
      { type:'gap', id:'ep-s3-gap' },
      ...(showTimeline ? [{
        type:'day',
        id:'ep-s3-day',
        date:'5/20',
        weekday:'周五',
        items:[recordGroup],
      }] : []),
    ];

    return (
      <div className="ep-s3" aria-label="方案3 语音转时间轴演示">
        <div className="ep-s3-send-text">
          今天体重 52kg，心情不错
        </div>
        {TimelineStream ? (
          <TimelineStream
            blocks={blocks}
            hideTodayGuide
            sisterCycleDone
          />
        ) : null}
        {extractionVisible && (
          <div className="ep-s3-extract" aria-label="AI 正在提取关键信息">
            <div className="ep-s3-extract-title">AI 正在提取关键信息</div>
            <div className="ep-s3-extract-line">
              今天
              <span className="ep-s3-mark is-weight">体重 52kg</span>
              ，
              <span className="ep-s3-mark is-mood">心情不错</span>
            </div>
          </div>
        )}
      </div>
    );
  }

  function EmptyScheme2Body(){
    const TimelineStream = window.TimelineStream;
    const viewportRef = React.useRef(null);
    const trackRef = React.useRef(null);
    const guideRef = React.useRef(null);
    const [shift, setShift] = React.useState(0);
    const [drifting, setDrifting] = React.useState(false);

    const baseBlocks = React.useMemo(() => {
      const source = cloneEmptyPlaygroundData(window.TIMELINE_BLOCKS || []);
      const keep = new Set(['gap-top', 'd-5-14', 'd-5-15', 'd-5-16', 'd-5-17']);
      const sample = source.filter(block => block.type === 'gap' || keep.has(block.id));
      return [
        ...sample,
        {
          type:'day',
          id:'ep-s4-today',
          date:'5/18',
          weekday:'周一',
          isToday:true,
          phaseTag:'经期第 1 天',
          phaseKind:'period',
          cycleDay:1,
          items:[],
        },
      ];
    }, []);

    React.useEffect(() => {
      const timer = setTimeout(() => {
        const viewport = viewportRef.current;
        const track = trackRef.current;
        const guide = guideRef.current;
        if(!viewport || !track || !guide) return;
        const viewportRect = viewport.getBoundingClientRect();
        const guideRect = guide.getBoundingClientRect();
        const guideTop = guideRect.top - viewportRect.top;
        const targetTop = Math.max(220, viewportRect.height - 235);
        const maxShift = Math.max(0, track.scrollHeight - viewportRect.height + 24);
        const nextShift = -Math.min(maxShift, Math.max(0, guideTop - targetTop));
        setShift(nextShift);
        requestAnimationFrame(() => setDrifting(true));
      }, 520);
      return () => clearTimeout(timer);
    }, []);

    return (
      <div className="ep-s4" ref={viewportRef} aria-label="方案4 示例数据下滑演示">
        <div
          className={'ep-s4-track' + (drifting ? ' is-drifting' : '')}
          ref={trackRef}
          style={{'--ep-s4-shift': `${shift}px`}}
        >
          {TimelineStream ? (
            <TimelineStream
              blocks={baseBlocks}
              hideTodayGuide
              sisterCycleDone
            />
          ) : null}
          <div className="ep-s4-guide" ref={guideRef}>
            <div className="ep-s4-guide-text">记录你的生活点滴</div>
          </div>
        </div>
        <div className="ep-s4-fade" aria-hidden="true"/>
      </div>
    );
  }

  function EmptyPlaygroundRecordBlankStream(props){
    const scene = props.scene;
    if(scene?.id !== 'empty-playground-3' && scene?.id !== 'empty-playground-4'){
      return OriginalRecordBlankStream(props);

          <div className="ep-bubble">说一句话，AI帮你记</div>

        <div className="ep-arrow-fab">
          <div className="ep-bubble">或点这里快捷记录</div>
          <CurveArrowSvg/>
        </div>
      </div>
    );
  }

  function CurveArrowSvg(){

  const EMPTY_ARROW_DEFAULTS = {
    'ep-s1-arrow-position-v3': null,
    'ep-s2-arrow-position': null,
    'ep-s5-arrow-position': null,
  };
  window.__getEmptyArrowPositions = () => {
    const result = {};
    Object.keys(EMPTY_ARROW_DEFAULTS).forEach((key) => {
      try{
        result[key] = JSON.parse(localStorage.getItem(key) || 'null') || EMPTY_ARROW_DEFAULTS[key];
      }catch(e){
        result[key] = EMPTY_ARROW_DEFAULTS[key];
      }
    });
    return result;
  };

  function EmptyFabArrow({hidden=false, editable=false, storageKey='ep-fab-arrow-position'}){
    const arrowRef = React.useRef(null);
    const dragRef = React.useRef(null);
    const clampPos = React.useCallback((next) => {
      if(!next || typeof window === 'undefined') return next;
      const width = arrowRef.current?.offsetWidth || 96;
      const height = arrowRef.current?.offsetHeight || 96;
      const pad = 8;
      return {
        left:Math.min(window.innerWidth - width - pad, Math.max(pad, next.left)),
        top:Math.min(window.innerHeight - height - pad, Math.max(pad, next.top)),
      };
    }, []);
    const [pos, setPos] = React.useState(() => {
      if(!editable) return null;
      const defaultPos = EMPTY_ARROW_DEFAULTS[storageKey] || null;
      try{
        const saved = localStorage.getItem(storageKey);
        if(!saved) return defaultPos;
        const parsed = JSON.parse(saved);
        if(
          typeof window === 'undefined' ||
          parsed.left < 0 ||
          parsed.top < 0 ||
          parsed.left > window.innerWidth - 24 ||
          parsed.top > window.innerHeight - 24
        ){
          localStorage.removeItem(storageKey);
          return defaultPos;
        }
        return parsed;
      }catch(e){
        return defaultPos;
      }
    });

    const handlePointerDown = React.useCallback((event) => {
      if(!editable || !arrowRef.current) return;
      event.preventDefault();
      const rect = arrowRef.current.getBoundingClientRect();
      const start = {
        x:event.clientX,
        y:event.clientY,
        left:rect.left,
        top:rect.top,
      };
      dragRef.current = start;
      arrowRef.current.setPointerCapture?.(event.pointerId);
    }, [editable]);

    const handlePointerMove = React.useCallback((event) => {
      if(!editable || !dragRef.current) return;
      const start = dragRef.current;
      setPos(clampPos({
        left:start.left + event.clientX - start.x,
        top:start.top + event.clientY - start.y,
      }));
    }, [clampPos, editable]);

    const handlePointerUp = React.useCallback(() => {
      if(!editable || !dragRef.current) return;
      dragRef.current = null;
      setPos((current) => {
        if(current){
          try{ localStorage.setItem(storageKey, JSON.stringify(current)); }catch(e){}
        }
        return current;
      });
    }, [editable, storageKey]);

    const handleDoubleClick = React.useCallback(() => {
      if(!editable) return;
      try{ localStorage.removeItem(storageKey); }catch(e){}
      setPos(null);
    }, [editable, storageKey]);

    const style = pos ? {
      left: `${pos.left}px`,
      top: `${pos.top}px`,
      right:'auto',
      bottom:'auto',
      marginLeft:0,
    } : null;

    return (
      <div
        ref={arrowRef}
        className={'ep-s1-fab-arrow' + (hidden ? ' is-hidden' : '') + (editable ? ' is-editable' : '')}
        style={style}
        onPointerDown={handlePointerDown}
        onPointerMove={handlePointerMove}
        onPointerUp={handlePointerUp}
        onPointerCancel={handlePointerUp}
        onDoubleClick={handleDoubleClick}
        aria-hidden="true"
      >
        <CurveArrowSvg/>
      </div>
    );
  }

    }, [guideVisible]);

    return (
      <div className="ep-s5" ref={viewportRef} aria-label="方案5 示例蒙层居中引导">
        <div
          className={'ep-s5-track' + (drifting ? ' is-drifting' : '')}
          ref={trackRef}
          style={{'--ep-s5-shift': `${shift}px`}}
        >
          {TimelineStream ? (
            <TimelineStream blocks={baseBlocks} hideTodayGuide hideGapDivider sisterCycleDone/>
          ) : null}
        </div>
        <div className={'ep-s5-guide' + (guideVisible ? ' is-visible' : '')}>
          <div className="ep-s5-brand">
            {titleText.slice(0, titleCount)}
            {guideVisible && titleCount < titleText.length ? <span className="ep-s5-cursor"/> : null}
          </div>
          <div className="ep-s5-guide-text">
            {subText.slice(0, subCount)}
            {guideVisible && titleCount >= titleText.length && subCount < subText.length ? <span className="ep-s5-cursor"/> : null}
          </div>
        </div>
        <EmptyFabArrow editable storageKey="ep-s5-arrow-position"/>
      </div>
    );
  }

  function EmptyScheme6Body(){
    return (
      <div className="ep-s6" aria-label="方案6 静态示例卡片引导">
        <section className="ep-s6-example-card" aria-hidden="true">
          <img src="./assets/empty-playground/scheme6-timeline-example.png" alt="点滴时间轴示例"/>
        </section>
        <div className="ep-s6-dock-bubble" aria-hidden="true">试试用语音记录吧。</div>
      </div>
    );
  }

  function EmptyPlaygroundRecordBlankStream(props){
    const scene = props.scene;
    const id = scene?.id;
    const legacySchemeMap = {
      'empty-playground-2': 1,
      'empty-playground-4': 3,
    };
    if(legacySchemeMap[id]){
      const legacyScene = {
        ...scene,
        calendar:{ ...scene.calendar, enabled:false },
        record:{
          ...scene.record,
          blankScheme:legacySchemeMap[id],
        },
      };
      const legacyStream = OriginalRecordBlankStream({
        ...props,
        scene:legacyScene,
      });
      if(id === 'empty-playground-2'){
        return (
          <>
            {legacyStream}
            <EmptyFabArrow editable storageKey="ep-s2-arrow-position"/>
          </>
        );
      }
      return legacyStream;
    }
    if(!/^empty-playground-[1356]$/.test(id || '')){
      return OriginalRecordBlankStream(props);
    }
    const Body = id === 'empty-playground-1'
      ? EmptyScheme1Body
      : id === 'empty-playground-5'
        ? EmptyScheme3Body
      : id === 'empty-playground-3'
          ? EmptyScheme5Body
          : id === 'empty-playground-6'
            ? EmptyScheme6Body
          : EmptyScheme2Body;
    return (
      <div className={'suiji-stream record-blank-stream ' + id.replace('empty-playground-', 'is-scheme')} ref={props.streamRef}>
        <EmptyPlaygroundHeader/>
        <Body/>
      </div>
    );
  }

  window.RecordBlankStream = EmptyPlaygroundRecordBlankStream;
})();
</script>

<!-- ====== 编辑浮层 iframe ====== -->
<div id="edit-modal-layer" style="
  position:fixed;inset:0;z-index:9999;display:none;
  background:transparent;
">
  <iframe id="edit-iframe" style="
    width:100%;height:100%;border:none;background:#fff;
    transform:translateY(100%);
    transition:transform 280ms cubic-bezier(0.2,0,0,1);
  " src="about:blank"></iframe>
</div>
<script>
(function(){
  var layer = document.getElementById('edit-modal-layer');
  var iframe = document.getElementById('edit-iframe');
  var editingEntryId = null;

  window.openEditModal = function(entryId, entryKind){
    editingEntryId = entryId;
    var scene = (['mixed','text','image','quick'].indexOf(entryKind) >= 0) ? entryKind : 'text';
    iframe.src = 'diandi_edit.html?scene=' + scene;
    layer.style.display = 'block';
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        iframe.style.transform = 'translateY(0)';
      });
    });
  };

  function closeEditModal(cb){
    iframe.style.transform = 'translateY(100%)';
    setTimeout(function(){
      layer.style.display = 'none';
      iframe.src = 'about:blank';
      if(cb) cb();
    }, 260);
  }

  window.addEventListener('message', function(e){
    if(!e.data || e.data.type !== 'edit-close') return;
    var action = e.data.action;
    closeEditModal(function(){
      if(action === 'save'){
        window.__showEditToast && window.__showEditToast('已保存');
      } else if(action === 'delete'){
        // 从 timeline DOM 移除对应卡片
        if(editingEntryId){
          var card = document.querySelector('[data-entry-id="'+editingEntryId+'"]');
          if(card){
            var rail = card.closest('.tl-rail-node');
            if(rail) rail.style.display = 'none';
            else card.style.display = 'none';
          }
        }
        window.__showEditToast && window.__showEditToast('记录已删除');
      }
      editingEntryId = null;
    });
  });

  // Toast helper — 借用已有 Toast 系统或简单实现
  window.__showEditToast = function(msg){
    var t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.78);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:10000;opacity:1;transition:opacity .3s;pointer-events:none;font-family:PingFang SC,sans-serif;';
    document.body.appendChild(t);
    setTimeout(function(){ t.style.opacity='0'; }, 1500);
    setTimeout(function(){ t.remove(); }, 1800);
  };
})();
</script>
